<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODIN ENG. — Project Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --bg: #000000;
  --surface: #FFFFFF;
  --surface2: #F3F4F6;
  --border: #E5E7EB;
  --border2: #F3F4F6;
  --txt1: #111827;
  --txt2: #374151;
  --txt3: #6B7280;
  --txt4: #9CA3AF;
  --blue: #3B82F6;
  --blue-bg: #EFF6FF;
  --blue-lt: #DBEAFE;
  --blue-dk: #1E40AF;
  --amber: #F59E0B;
  --amber-bg: #FFFBEB;
  --amber-lt: #FEF3C7;
  --amber-dk: #92400E;
  --green: #22C55E;
  --green-lt: #DCFCE7;
  --green-dk: #15803D;
  --red-lt: #FEE2E2;
  --red-dk: #991B1B;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--sans); font-size: 13px; color: var(--txt1); background: var(--bg); }
body { display: flex; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sb {
  width: 220px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; height: 100vh; overflow: hidden;
}
#sb-head { padding: 18px 16px 12px; border-bottom: 1px solid var(--border2); flex-shrink: 0; }
#sb-head .app-name { font-size: 15px; font-weight: 600; color: var(--txt1); letter-spacing: -0.01em; }
#sb-head .app-sub  { font-size: 10px; font-family: var(--mono); color: var(--txt4); letter-spacing: 0.04em; margin-top: 2px; }
#sb-label { padding: 10px 16px 4px; font-size: 10px; font-family: var(--mono); color: var(--txt4); letter-spacing: 0.06em; }
#pjl { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
#pjl::-webkit-scrollbar { width: 3px; }
#pjl::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#sb-footer { padding: 10px 8px; border-top: 1px solid var(--border); flex-shrink: 0; }

.pj { padding: 10px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s; margin-bottom: 2px; }
.pj:hover:not(.on) { background: var(--surface2); }
.pj.on { background: var(--blue-lt); }
.pj .pj-name { font-size: 12px; font-weight: 500; color: var(--txt1); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
.pj.on .pj-name { color: var(--blue-dk); }

/* ── Main ────────────────────────────────────────────────────────────────── */
#mn { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#proj-hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 22px 0; flex-shrink: 0; }
#proj-body { flex: 1; overflow-y: auto; padding: 16px 22px; }
#proj-body::-webkit-scrollbar { width: 4px; }
#proj-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Tabs ────────────────────────────────────────────────────────────────── */
.tabs { display: flex; margin-top: 6px; flex-wrap: wrap; }
.tb { background: none; border: none; cursor: pointer; padding: 8px 14px; font-family: var(--sans); font-size: 13px; color: var(--txt4); border-bottom: 2px solid transparent; transition: all 0.15s; }
.tb:hover:not(.on) { color: var(--txt2); }
.tb.on { color: var(--blue); border-bottom-color: var(--blue); }

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.card-lbl { font-size: 10px; font-family: var(--mono); color: var(--txt4); letter-spacing: 0.07em; margin-bottom: 10px; text-transform: uppercase; }

/* ── Stage tracker ───────────────────────────────────────────────────────── */
#stage-wrap { position: relative; padding: 10px 0 6px; }
#stage-track-bg { position: absolute; top: 15px; left: 10%; width: 80%; height: 2px; background: var(--border); z-index: 0; }
#stage-track-fg { position: absolute; top: 15px; left: 10%; height: 2px; background: var(--green); z-index: 0; transition: width 0.3s; }
#stage-dots { display: flex; position: relative; z-index: 1; }
.sg-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 0; }
.sg-btn:hover .sg-dot { transform: scale(1.2); }
.sg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); background: #fff; transition: transform 0.15s; }
.sg-lbl { font-size: 8px; font-family: var(--mono); color: var(--txt4); white-space: nowrap; }

/* ── Updates panel ───────────────────────────────────────────────────────── */
#upd-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
.upd-hdr { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.upd-row { padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; border-top: 1px solid var(--border2); }
.upd-form-wrap { padding: 12px 14px; border-top: 1px solid var(--border2); background: #FAFAFA; }

/* ── BOM table ───────────────────────────────────────────────────────────── */
.bom-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
.bom-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
.bom-wrap th { padding: 8px 12px; font-size: 10px; font-family: var(--mono); color: var(--txt4); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); }
.bom-wrap td { padding: 8px 12px; color: var(--txt2); border-bottom: 1px solid var(--border2); background: var(--surface); }
.bom-wrap tr:last-child td { border-bottom: none; }
.bom-wrap tr:hover td { background: var(--surface2); }

/* ── Inputs & buttons ────────────────────────────────────────────────────── */
input[type=text], textarea, select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--txt1); font-family: var(--mono);
  font-size: 12px; padding: 7px 10px; outline: none; width: 100%;
  transition: border-color 0.15s;
}
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--blue); background: #fff; }
select { font-family: var(--sans); cursor: pointer; }
textarea { resize: vertical; line-height: 1.6; }
input[type=checkbox] { cursor: pointer; accent-color: var(--blue); width: 14px; height: 14px; }
input[type=range] { cursor: pointer; accent-color: var(--blue); width: 100%; }

button {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 5px 12px; font-family: var(--sans);
  font-size: 12px; color: var(--txt2); cursor: pointer; transition: all 0.1s;
  white-space: nowrap;
}
button:hover { background: var(--surface2); border-color: #D1D5DB; }
.btn-primary { background: var(--blue-lt); color: var(--blue-dk); border-color: #BFDBFE; }
.btn-primary:hover { background: #BFDBFE; }
.btn-warn { background: var(--amber-lt); color: var(--amber-dk); border-color: #FDE68A; }
.btn-danger { background: var(--red-lt); color: var(--red-dk); border-color: #FECACA; }
.btn-danger:hover { background: #FECACA; }
.btn-full { width: 100%; text-align: center; }

/* ── Tags & badges ───────────────────────────────────────────────────────── */
.tag { display: inline-flex; align-items: center; font-family: var(--mono); font-size: 9px; letter-spacing: 0.05em; border-radius: 4px; padding: 2px 7px; }
.badge { display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--mono); border-radius: 10px; padding: 1px 6px; font-weight: 500; }

/* ── Progress bars ───────────────────────────────────────────────────────── */
.pbar-wrap { }
.pbar-lbl { display: flex; justify-content: space-between; margin-bottom: 5px; }
.pbar-lbl span { font-size: 11px; font-family: var(--mono); color: var(--txt4); }
.pbar-lbl strong { font-size: 11px; font-family: var(--mono); }
.pbar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.mini-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 7px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 1px; background: var(--blue); }

/* ── Grid ────────────────────────────────────────────────────────────────── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid2 .full { grid-column: 1 / -1; }

/* ── Chips ───────────────────────────────────────────────────────────────── */
.chip { display: inline-flex; align-items: center; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--txt2); margin: 2px; gap: 4px; }
.chip-x { border: none; background: none; color: var(--txt4); font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1; }
.chip-x:hover { color: var(--red-dk); background: none; border: none; }

/* ── Blocker rows ────────────────────────────────────────────────────────── */
.blk-row { display: flex; gap: 10px; align-items: flex-start; padding: 9px 11px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 7px; }
.blk-row.done { opacity: 0.45; }
.blk-row.done span { text-decoration: line-through; color: var(--txt4); }

/* ── Sidebar blocker flash ────────────────────────────────────────────────── */
@keyframes pjFlash {
  0%,100% { background: transparent; box-shadow: none; }
  50%      { background: #FEE2E2; box-shadow: inset 0 0 0 2px #FCA5A5; }
}
.pj.has-blocker { animation: pjFlash 2s ease-in-out infinite; border-radius: var(--radius); }
.pj.has-blocker.on { animation: none; background: var(--blue-lt); }

/* ── Update edit inline form ─────────────────────────────────────────────── */
.upd-edit-wrap { padding: 12px 14px; border-top: 1px solid var(--border2); background: #FAFAFA; }

/* ── Activity log ────────────────────────────────────────────────────────── */
.act-row { display: flex; gap: 14px; margin-bottom: 8px; }
.act-date { font-size: 10px; font-family: var(--mono); color: var(--txt4); white-space: nowrap; padding-top: 1px; min-width: 44px; }

/* ── Import code block ───────────────────────────────────────────────────── */
.code-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-family: var(--mono); font-size: 11px; line-height: 1.9; }
.code-key { color: var(--blue); display: inline-block; min-width: 100px; }
.code-val { color: var(--txt4); }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty { text-align: center; padding: 40px; color: var(--txt4); font-size: 12px; font-family: var(--mono); }

/* ── Settings form ───────────────────────────────────────────────────────── */
.s-field { margin-bottom: 14px; }
.s-label { font-size: 10px; font-family: var(--mono); color: var(--txt4); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 5px; }

/* ── Modal overlays ──────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: #fff; border-radius: 14px; padding: 22px; width: 420px;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
}
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--txt4); margin-bottom: 16px; }

/* ── Section picker grid ─────────────────────────────────────────────────── */
.sec-pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sec-pick-opt { padding: 14px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .15s; text-align: left; background: var(--surface); }
.sec-pick-opt:hover { border-color: var(--blue); background: var(--blue-bg); }
.sec-pick-icon { font-size: 20px; margin-bottom: 6px; display: block; }
.sec-pick-lbl { font-size: 12px; font-weight: 500; color: var(--txt1); display: block; }
.sec-pick-desc { font-size: 10px; color: var(--txt4); margin-top: 2px; display: block; }

/* ── Custom section cards ────────────────────────────────────────────────── */
.sec-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
.sec-card-hdr { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-bottom: 1px solid var(--border); }
.sec-card-body { padding: 14px; }

/* ── Section inner tables ────────────────────────────────────────────────── */
.sec-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
.sec-tbl th { padding: 6px 10px; font-size: 10px; font-family: var(--mono); color: var(--txt4); font-weight: 500; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); text-align: left; }
.sec-tbl td { padding: 7px 10px; border-bottom: 1px solid var(--border2); color: var(--txt2); }
.sec-tbl tr:last-child td { border-bottom: none; }
.btn-del { font-size: 10px; padding: 2px 7px; color: #EF4444; border-color: #FECACA; background: #FEF2F2; }
.btn-del:hover { background: #FECACA; }

/* ── Add section dashed button ───────────────────────────────────────────── */
.btn-add-sec { width: 100%; padding: 11px; color: var(--txt4); font-size: 12px; border-style: dashed; margin-top: 4px; background: transparent; }
.btn-add-sec:hover { background: var(--surface2); color: var(--txt2); border-color: #9CA3AF; }

/* ── Scrollbar global ────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Mobile menu button (hidden on desktop) ──────────────────────────────── */
#mob-bar { display: none; }

/* ── Mobile styles ───────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  body { flex-direction: column; overflow: auto; }

  /* Mobile top bar */
  #mob-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50; flex-shrink: 0;
  }
  #mob-bar .app-name { font-size: 15px; font-weight: 600; }
  #mob-bar .app-sub  { font-size: 10px; font-family: var(--mono); color: var(--txt4); }
  #mob-menu-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 10px; font-size: 16px; cursor: pointer; color: var(--txt2);
  }

  /* Sidebar becomes a slide-in drawer */
  #sb {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    width: 260px; height: 100vh;
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,0.12);
  }
  #sb.open { transform: translateX(0); }

  /* Overlay behind sidebar */
  #sb-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90;
  }
  #sb-overlay.show { display: block; }

  /* Main takes full width */
  #mn { height: auto; overflow: visible; }
  #proj-hdr { position: sticky; top: 0; z-index: 40; padding: 10px 14px 0; }
  #proj-body { padding: 12px 14px; overflow: visible; }

  /* Collapse two-column grid to one column */
  .grid2 { grid-template-columns: 1fr; }

  /* Tables scroll horizontally */
  .bom-wrap { overflow-x: auto; }
  .sec-tbl  { min-width: 480px; }

  /* Tabs scroll horizontally */
  .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tb { padding: 8px 10px; font-size: 12px; flex-shrink: 0; }

  /* Stack BOM add-part form */
  #tab-content [style*="grid-template-columns:2fr"] {
    grid-template-columns: 1fr !important;
  }

  /* Stack section add forms */
  .sec-card-body [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }

  /* Modal sizing */
  .modal-box { width: 92vw; padding: 18px; }

  /* Header adjustments */
  #proj-hdr h1 { font-size: 15px; }
  #proj-hdr a[href] { display: none; }
}
</style>
</head>
<body>

<!-- Mobile top bar -->
<div id="mob-bar">
  <div>
    <div class="app-name">Engineering Hub</div>
    <div class="app-sub">project dashboard</div>
  </div>
  <button id="mob-menu-btn">☰</button>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="sb-overlay"></div>

<!-- Sidebar -->
<div id="sb">
  <div id="sb-head">
    <div class="app-name">ODIN ENG.</div>
    <div class="app-sub">Project Hub</div>
  </div>
  <div id="sb-label">Projects</div>
  <div id="pjl"></div>
  <div style="padding:4px 8px 0;border-top:1px solid var(--border2);margin-top:4px">
    <div style="font-size:10px;font-family:var(--mono);color:var(--txt4);letter-spacing:0.06em;padding:8px 8px 2px">Tools</div>
    <div id="inv-nav"></div>
  </div>
  <div id="sb-footer">
    <button class="btn-full" id="np-btn">+ New project</button>
    <div id="np-form" style="display:none;margin-top:8px">
      <input type="text" id="np-inp" placeholder="Project name…" style="margin-bottom:6px;font-family:var(--sans)">
      <div style="display:flex;gap:6px">
        <button id="np-ok" style="flex:1;font-size:11px">Create</button>
        <button id="np-x"  style="flex:1;font-size:11px">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Main -->
<div id="mn">
  <div id="proj-hdr"></div>
  <div id="proj-body"></div>
</div>

<!-- Section picker modal -->
<div id="sec-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Add a section</div>
    <div class="modal-sub">Choose a panel type to add to this project</div>
    <div class="sec-pick-grid" id="sec-pick-grid"></div>
    <button data-closesecmodal style="margin-top:14px;width:100%;text-align:center;color:var(--txt4)">Cancel</button>
  </div>
</div>

<!-- Delete project confirm modal -->
<div id="del-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Delete project?</div>
    <div class="modal-sub" id="del-modal-sub"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button data-confirmdelete class="btn-danger" style="flex:1;padding:9px">Yes, delete</button>
      <button data-canceldelete style="flex:1;padding:9px">Cancel</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// ENGINEERING PROJECT HUB — Main Script
// ════════════════════════════════════════════════════════════════════════════
//
// HOW THIS FILE IS ORGANIZED:
//   1. Constants    — fixed values like stage names and colors
//   2. Default data — the example projects shown on first load
//   3. State (S)    — everything the app needs to remember while running
//   4. Persistence  — save() and load() talk to the Supabase cloud database
//   5. Helpers      — small reusable functions used throughout
//   6. Render fns   — rSB(), rMain(), rOverview() etc. build the HTML you see
//   7. Event handlers — respond to clicks, checkboxes, text input
//   8. Action fns   — doAddBOM(), doArchiveProject() etc. change the data
//   9. Boot         — loads data from cloud then draws the page
//
// TO MAKE CHANGES:
//   • Change colors → edit the CSS :root variables near the top of <style>
//   • Change stage names → edit the STAGES array below
//   • Change update types → edit the UPD_T object below
//   • Change what a tab shows → find its render function (e.g. rBOM, rOverview)
//   • Add a new tab → add it to the tabs array in rMain(), add a case in the
//     switch statement, and write a new render function like rMyTab(p)
// ════════════════════════════════════════════════════════════════════════════

// ── CONSTANTS ─────────────────────────────────────────────────────────────
// STAGES: the project lifecycle steps shown in the progress tracker.
// Order matters — they appear left to right. Add or rename as needed.
const STAGES = ['Concept','Design','Prototyping','Testing','Complete'];

// STAGE_C: background color and text color for each stage tag/badge.
// Format: StageName: ['background hex', 'text hex']
const STAGE_C = {
  Concept:     ['#F3F4F6','#374151'],
  Design:      ['#DBEAFE','#1E40AF'],
  Prototyping: ['#FEF3C7','#92400E'],
  Testing:     ['#FEE2E2','#991B1B'],
  Complete:    ['#DCFCE7','#15803D']
};

// UPD_T: the types of team updates that can be posted.
// l = label shown on the tag, bg = tag background, tc = tag text color.
// Add a new type here and it will appear in the dropdown automatically.
const UPD_T = {
  direction: { l:'Needs direction', bg:'#FEF3C7', tc:'#92400E' },
  request:   { l:'Project request', bg:'#EDE9FE', tc:'#5B21B6' },
  ordered:   { l:'Ordered',         bg:'#DBEAFE', tc:'#1E40AF' },
  info:      { l:'Info / FYI',      bg:'#F3F4F6', tc:'#374151' },
  done:      { l:'Done',            bg:'#DCFCE7', tc:'#15803D' }
};

// SEC_TYPES: the optional section panels that can be added to any project.
// Each entry becomes a button in the "Add section" picker.
const SEC_TYPES = {
  budget:     { label:'Budget',      icon:'💰', desc:'Track parts costs & spending' },
  milestones: { label:'Milestones',  icon:'🎯', desc:'Key dates & checkpoints' },
  testlog:    { label:'Test Log',    icon:'⚡', desc:'Record test results' },
  links:      { label:'Links',       icon:'🔗', desc:'Resources & references' },
  custom:     { label:'Custom Note', icon:'📝', desc:'Freeform text block' }
};

// ── SUPABASE CONNECTION ────────────────────────────────────────────────────

// ── STATE ──────────────────────────────────────────────────────────────────
// S is the single object that holds everything the app needs while running.
// Any time data changes, we update S and call save() to sync to Supabase,
// then call render() or rMain() to redraw the screen.
let S = {
  sel: 1,              // ID of the currently selected project
  tab: 'overview',     // Which tab is active: 'overview','bom','firmware','settings','import'
  view: 'projects',    // Top-level view: 'projects' | 'inventory'
  showArchived: false, // Whether archived projects are visible at the bottom of the sidebar
  importTxt: '',       // The text currently typed in the Import tab textarea
  preview: null,       // Parsed result of the import preview (null if not previewed yet)
  newBlocker: '',      // Text in the "add blocker" input (preserved across re-renders)
  showUF: false,       // Whether the "Post update" form is expanded
  editingUpdateId: null, // ID of the update currently being edited inline
  editingBomId: null,    // ID of the BOM item currently being edited
  editingInvId: null,    // ID of the inventory item currently being edited
  ud: { type: 'direction', author: '', text: '' }, // Current state of the post-update form
  projects: JSON.parse(JSON.stringify(DEFAULT_PROJECTS)), // Deep copy so defaults aren't mutated
  inventory: []        // Global parts inventory (shared across all projects)
};

// ── PERSISTENCE ────────────────────────────────────────────────────────────
// save() pushes the entire projects array to Supabase row id=1.
// It's called automatically any time data changes (checkbox, form submit, etc).
// The save happens in the background — the UI updates immediately.
async function save() {
  try {
    await sbClient.from('hub_data').upsert({ id: 1, projects: S.projects });
    await sbClient.from('hub_data').upsert({ id: 2, projects: S.inventory }); // row 2 stores inventory
  } catch(e) { console.error('Save failed:', e); }
}

// load() fetches the projects array from Supabase when the page first opens.
// Also handles "migrations" — adding new fields to old saved data so the app
// doesn't break when we add features like 'archived' or 'sections'.
async function load() {
  try {
    // Load projects (row 1)
    const { data, error } = await sbClient
      .from('hub_data').select('projects').eq('id', 1).single();
    if (error) throw error;
    if (data?.projects?.length) {
      data.projects.forEach(p => {
        if (!Array.isArray(p.sections))  p.sections = [];
        if (p.archived === undefined)    p.archived = false;
        if (!Array.isArray(p.updates))   p.updates = [];
        if (!Array.isArray(p.blockers))  p.blockers = [];
        if (p.summary === undefined)     p.summary = '';
        p.updates.forEach(u => { if (u.isBlocker === undefined) u.isBlocker = false; });
        // v5 BOM migration: move to cost-focused format
        p.bom.forEach(b => {
          if (b.qtyPerBuild === undefined) b.qtyPerBuild = b.qty || 1;
          if (b.unitCost    === undefined) b.unitCost    = 0;
          if (b.inventoryId === undefined) b.inventoryId = null;
        });
      });
      S.projects = data.projects;
      S.sel = S.projects[0].id;
    }

    // Load inventory (row 2)
    const { data: invData } = await sbClient
      .from('hub_data').select('projects').eq('id', 2).single();
    if (invData?.projects?.length) {
      invData.projects.forEach(item => {
        if (item.qtyOnHand    === undefined) item.qtyOnHand    = 0;
        if (item.qtyOrdered   === undefined) item.qtyOrdered   = 0;
        if (item.reorderAt    === undefined) item.reorderAt    = 5;
        if (item.ordered      === undefined) item.ordered      = false;
        if (item.received     === undefined) item.received     = false;
        if (item.supplier     === undefined) item.supplier     = '';
        if (item.supplierUrl  === undefined) item.supplierUrl  = '';
        if (item.unitCost     === undefined) item.unitCost     = 0;
      });
      S.inventory = invData.projects;
    }
  } catch(e) { console.error('Load failed:', e); }
}

// P() returns the currently selected project object (shortcut used everywhere)
const P   = () => S.projects.find(p => p.id === S.sel);
// tdy() returns today's date formatted like "Apr 29" for log entries
const tdy = () => new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });

// esc() makes text safe to put inside HTML — prevents broken layouts if someone
// types < > & " in a project name or update text
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// stag() returns a colored stage badge like [Prototyping] using STAGE_C colors
function stag(s) {
  const [bg, tc] = STAGE_C[s] || STAGE_C.Concept;
  return `<span class="tag" style="background:${bg};color:${tc}">${s}</span>`;
}
// getSharedProjects() returns names of other projects that also use a given part
function getSharedProjects(partName, currentProjectId) {
  return S.projects
    .filter(p => p.id !== currentProjectId && !p.archived &&
      p.bom.some(b => b.part.toLowerCase() === partName.toLowerCase()))
    .map(p => p.name);
}

// getInventoryItem() finds an inventory item by part name (case-insensitive)
function getInventoryItem(partName) {
  return S.inventory.find(i => i.part.toLowerCase() === partName.toLowerCase());
}

function mbar(v, c='#3B82F6') {
  return `<div class="mini-bar"><div class="mini-bar-fill" style="width:${v}%;background:${c}"></div></div>`;
}
function pbar(lbl, v, c='#3B82F6') {
  return `<div class="pbar-wrap">
    <div class="pbar-lbl"><span>${lbl}</span><strong style="color:${c}">${v}%</strong></div>
    <div class="pbar-track"><div class="pbar-fill" style="width:${v}%;background:${c}"></div></div>
  </div>`;
}
function parseImport(txt) {
  const r = {}, acts = [];
  txt.split('\n').forEach(l => {
    const m = l.match(/^([A-Za-z\s]+?):\s*(.+)$/);
    if (!m) return;
    const k = m[1].trim().toLowerCase(), v = m[2].trim();
    if (k==='firmware') r.fw = Math.min(100,Math.max(0,parseInt(v)||0));
    if (k==='hardware') r.hw = Math.min(100,Math.max(0,parseInt(v)||0));
    if (k==='stage') { const s=STAGES.find(x=>x.toLowerCase()===v.toLowerCase()); if(s) r.stage=s; }
    if (k==='notes')   r.notes   = v;
    if (k==='blocker') r.blocker = v;
    if (k==='activity') acts.push(v);
  });
  if (acts.length) r.acts = acts;
  return r;
}

        <span class="tag" style="background:#D1FAE5;color:#15803D;flex-shrink:0;margin-top:1px">${t.l}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:#374151;line-height:1.5;margin-bottom:3px;text-decoration:line-through">${esc(u.text)}</div>
          <div style="font-size:10px;font-family:var(--mono);color:#9CA3AF">${esc(u.author)} · ${u.date} · Resolved</div>
        </div>
        <button data-delupdid="${u.id}" class="btn-danger" style="font-size:11px;padding:3px 7px;flex-shrink:0">×</button>
      </div>`;
    }).join('');
  }

  panel.innerHTML = html;

  const udt = document.getElementById('ud-type');
  if (udt) { udt.value=S.ud.type; udt.addEventListener('change',e=>{ S.ud.type=e.target.value; }); }
  const uda = document.getElementById('ud-auth');
  if (uda) { uda.value=S.ud.author; uda.addEventListener('input',e=>{ S.ud.author=e.target.value; }); }
  const udx = document.getElementById('ud-txt');
  if (udx) { udx.value=S.ud.text; udx.addEventListener('input',e=>{ S.ud.text=e.target.value; }); }
}

// ── Tab: Overview ──────────────────────────────────────────────────────────
function rOverview(p) {
  const sectHtml = (p.sections||[]).map(sec => rSection(sec)).join('');

  // Auto-generated summary lines from live project data
  const openUpd    = p.updates.filter(u => !u.resolved);
  const blockerUpd = openUpd.filter(u => u.isBlocker);
  const dirUpd     = openUpd.filter(u => u.type === 'direction');
  const reqUpd     = openUpd.filter(u => u.type === 'request');
  const rcvd       = p.bom.filter(b => b.received).length;

  const summaryLines = [];
  summaryLines.push(`<strong>${esc(p.name)}</strong> is currently in the <strong>${p.stage}</strong> stage.`);
  summaryLines.push(`Firmware <strong>${p.fw}%</strong> complete &nbsp;·&nbsp; Hardware <strong>${p.hw}%</strong> complete.`);
  if (p.lead) {
    const others = p.team.length > 1 ? ` with ${p.team.length - 1} other member${p.team.length > 2 ? 's' : ''}` : '';
    summaryLines.push(`Led by <strong>${esc(p.lead)}</strong>${others}.`);
  }
  if (blockerUpd.length) {
    summaryLines.push(`<span style="color:#DC2626">⚠ ${blockerUpd.length} active blocker${blockerUpd.length>1?'s':''} need${blockerUpd.length>1?'':'s'} resolution.</span>`);
  } else if (dirUpd.length) {
    summaryLines.push(`<span style="color:#92400E">${dirUpd.length} update${dirUpd.length>1?'s':''} need${dirUpd.length>1?'':'s'} direction.</span>`);
  } else if (reqUpd.length) {
    summaryLines.push(`<span style="color:#5B21B6">${reqUpd.length} project request${reqUpd.length>1?'s':''} pending.</span>`);
  } else if (openUpd.length) {
    summaryLines.push(`${openUpd.length} open team update${openUpd.length>1?'s':''}.`);
  } else {
    summaryLines.push(`<span style="color:#15803D">✓ No open team updates — all clear.</span>`);
  }
  if (p.bom.length) summaryLines.push(`BOM: <strong>${rcvd}/${p.bom.length}</strong> parts received.`);

  return `
  <div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,#F8FAFF 0%,#EEF2FF 100%);border-color:#C7D2FE">
    <div class="card-lbl" style="color:#3730A3;margin-bottom:8px">Project Overview</div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
      ${summaryLines.map(l=>`<div style="font-size:13px;color:var(--txt2);line-height:1.6">${l}</div>`).join('')}
    </div>
    <label style="font-size:10px;font-family:var(--mono);color:#6366F1;letter-spacing:0.06em;text-transform:uppercase;display:block;margin-bottom:5px">Team notes</label>
    <textarea id="proj-summary-ta" placeholder="Add context, decisions, or notes for the team…"
      style="min-height:56px;font-family:var(--sans);font-size:13px;background:rgba(255,255,255,0.75);border-color:#C7D2FE"
    >${esc(p.summary||'')}</textarea>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-lbl">Team</div>
      <div style="font-size:11px;color:var(--txt4);margin-bottom:3px">Lead</div>
      <div style="margin-bottom:12px;font-weight:500">${esc(p.lead)||'—'}</div>
      <div style="font-size:11px;color:var(--txt4);margin-bottom:6px">Members</div>
      <div>${p.team.length
        ? p.team.map(m=>`<span class="chip">${esc(m)}</span>`).join('')
        : '<span style="color:var(--txt4);font-size:11px">None assigned</span>'}</div>
    </div>
    <div class="card">
      <div class="card-lbl">Progress</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${pbar('Firmware',p.fw)}
        ${pbar('Hardware',p.hw,'#F59E0B')}
      </div>
    </div>
    <div class="card full">
      <div class="card-lbl">Recent activity</div>
      ${p.log.length
        ? p.log.slice(0,8).map(a=>`<div class="act-row"><span class="act-date">${a.date}</span><span style="font-size:12px;color:var(--txt2)">${esc(a.text)}</span></div>`).join('')
        : '<span style="font-size:11px;color:var(--txt4)">No activity yet</span>'}
    </div>
  </div>
  ${sectHtml}
  <button class="btn-add-sec" data-opensecmodal>+ Add section</button>`;
}

// ── Section renders ────────────────────────────────────────────────────────
function rSection(sec) {
  const def = SEC_TYPES[sec.type] || { label:sec.type, icon:'📦' };
  const title = esc(sec.title || def.label);
  let body = '';

  if (sec.type === 'budget') {
    const items = sec.data.items || [];
    const total = items.reduce((s,i)=>s+(parseFloat(i.cost)||0)*(parseInt(i.qty)||1),0);
    body = `${items.length ? `<table class="sec-tbl">
      <thead><tr>
        <th>Item</th><th style="text-align:center">Qty</th>
        <th style="text-align:right">Unit $</th><th style="text-align:right">Total</th><th></th>
      </tr></thead>
      <tbody>
        ${items.map(i=>`<tr>
          <td>${esc(i.name)}</td>
          <td style="text-align:center;font-family:var(--mono)">${i.qty}</td>
          <td style="text-align:right;font-family:var(--mono)">$${parseFloat(i.cost||0).toFixed(2)}</td>
          <td style="text-align:right;font-family:var(--mono);font-weight:500">$${((parseFloat(i.cost)||0)*(parseInt(i.qty)||1)).toFixed(2)}</td>
          <td style="text-align:center"><button class="btn-del" data-delbitem="${sec.id}" data-iid="${i.id}">×</button></td>
        </tr>`).join('')}
        <tr><td colspan="3" style="font-size:11px;font-family:var(--mono);color:var(--txt4);padding:7px 10px">Total</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:600">$${total.toFixed(2)}</td><td></td></tr>
      </tbody>
    </table>` : '<p style="font-size:11px;color:var(--txt4);font-family:var(--mono);margin-bottom:12px">No items yet</p>'}
    <div style="display:grid;grid-template-columns:2fr 70px 100px auto;gap:8px;align-items:center">
      <input type="text" data-bf-name="${sec.id}" placeholder="Item name…" style="font-family:var(--sans)">
      <input type="text" data-bf-qty="${sec.id}"  placeholder="Qty" style="text-align:center">
      <input type="text" data-bf-cost="${sec.id}" placeholder="Unit cost $" style="text-align:right">
      <button class="btn-primary" data-addbitem="${sec.id}" style="font-size:11px;padding:6px 12px">Add</button>
    </div>`;

  } else if (sec.type === 'milestones') {
    const items = sec.data.items || [];
    body = `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
      ${items.length ? items.map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)${i.done?';opacity:0.5':''}">
        <input type="checkbox" ${i.done?'checked':''} data-milcheck="${sec.id}" data-iid="${i.id}">
        <span style="flex:1;font-size:13px${i.done?';text-decoration:line-through;color:var(--txt4)':''}">${esc(i.text)}</span>
        <span style="font-size:10px;font-family:var(--mono);color:var(--txt4)">${esc(i.date||'')}</span>
        <button class="btn-del" data-delmitem="${sec.id}" data-iid="${i.id}">×</button>
      </div>`).join('') : '<div style="font-size:11px;color:var(--txt4);font-family:var(--mono)">No milestones yet</div>'}
    </div>
    <div style="display:grid;grid-template-columns:1fr 130px auto;gap:8px;align-items:center">
      <input type="text" data-mf-text="${sec.id}" placeholder="Milestone description…" style="font-family:var(--sans)">
      <input type="text" data-mf-date="${sec.id}" placeholder="Due date…" style="font-family:var(--sans)">
      <button class="btn-primary" data-addmitem="${sec.id}" style="font-size:11px;padding:6px 12px">Add</button>
    </div>`;

  } else if (sec.type === 'testlog') {
    const items = sec.data.items || [];
    body = `${items.length ? `<table class="sec-tbl" style="margin-bottom:12px">
      <thead><tr><th>Date</th><th>Test</th><th>Result</th><th>Notes</th><th></th></tr></thead>
      <tbody>${items.map(i=>{
        const rc=i.result==='pass'?'#15803D':i.result==='fail'?'#991B1B':'#92400E';
        const rb=i.result==='pass'?'#DCFCE7':i.result==='fail'?'#FEE2E2':'#FEF3C7';
        return `<tr>
          <td style="font-family:var(--mono);color:var(--txt4);white-space:nowrap">${esc(i.date)}</td>
          <td style="font-weight:500">${esc(i.test)}</td>
          <td><span class="tag" style="background:${rb};color:${rc}">${esc(i.result)}</span></td>
          <td style="color:var(--txt4)">${esc(i.notes||'—')}</td>
          <td style="text-align:center"><button class="btn-del" data-deltitem="${sec.id}" data-iid="${i.id}">×</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : '<p style="font-size:11px;color:var(--txt4);font-family:var(--mono);margin-bottom:12px">No results logged yet</p>'}
    <div style="display:grid;grid-template-columns:90px 1fr 110px 1fr auto;gap:8px;align-items:center">
      <input type="text" data-tf-date="${sec.id}"   placeholder="Date…" style="font-family:var(--sans)">
      <input type="text" data-tf-test="${sec.id}"   placeholder="Test name…" style="font-family:var(--sans)">
      <select data-tf-result="${sec.id}">
        <option value="pass">Pass</option>
        <option value="fail">Fail</option>
        <option value="partial">Partial</option>
      </select>
      <input type="text" data-tf-notes="${sec.id}"  placeholder="Notes…" style="font-family:var(--sans)">
      <button class="btn-primary" data-addtitem="${sec.id}" style="font-size:11px;padding:6px 10px">Log</button>
    </div>`;

  } else if (sec.type === 'links') {
    const items = sec.data.items || [];
    body = `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
      ${items.length ? items.map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)">
        <a href="${esc(i.url)}" target="_blank" style="flex:1;font-size:13px;color:var(--blue);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.label||i.url)}</a>
        <button class="btn-del" data-dellitem="${sec.id}" data-iid="${i.id}" style="flex-shrink:0">×</button>
      </div>`).join('') : '<div style="font-size:11px;color:var(--txt4);font-family:var(--mono)">No links yet</div>'}
    </div>
    <div style="display:grid;grid-template-columns:160px 1fr auto;gap:8px;align-items:center">
      <input type="text" data-lf-label="${sec.id}" placeholder="Label…" style="font-family:var(--sans)">
      <input type="text" data-lf-url="${sec.id}"   placeholder="https://…" style="font-family:var(--mono);font-size:11px">
      <button class="btn-primary" data-addlitem="${sec.id}" style="font-size:11px;padding:6px 12px">Add</button>
    </div>`;

  } else if (sec.type === 'custom') {
    body = `<textarea data-customta="${sec.id}" style="min-height:100px;font-family:var(--sans);font-size:13px" placeholder="Notes, observations, anything…"></textarea>`;
  }

  return `<div class="sec-card">
    <div class="sec-card-hdr">
      <span style="font-size:13px;font-weight:500">${def.icon} ${title}</span>
      <button data-removesec="${sec.id}" style="font-size:11px;padding:3px 9px;color:var(--txt4)">Remove</button>
    </div>
    <div class="sec-card-body">${body}</div>
  </div>`;
}

// ── Tab: BOM ───────────────────────────────────────────────────────────────
function rBOM(p) {
  const costPerBuild = p.bom.reduce((s,b) => s + (b.qtyPerBuild||1)*(parseFloat(b.unitCost)||0), 0);

  const rows = p.bom.length ? p.bom.map(b => {
    // ── Inline edit row ──
    if (S.editingBomId == b.id) {
      return `<tr style="background:#F8FAFF;">
        <td colspan="6" style="padding:10px 12px">
          <div style="display:grid;grid-template-columns:2fr 80px 100px 1fr;gap:8px;margin-bottom:8px;align-items:end">
            <div>
              <div style="font-size:10px;font-family:var(--mono);color:var(--txt4);margin-bottom:3px">Part name</div>
              <input type="text" data-bedit-part="${b.id}" value="${esc(b.part)}" style="font-family:var(--sans);width:100%">
            </div>
            <div>
              <div style="font-size:10px;font-family:var(--mono);color:var(--txt4);margin-bottom:3px">Qty/Build</div>
              <input type="number" data-bedit-qty="${b.id}" value="${b.qtyPerBuild||1}" min="1" style="text-align:center;width:100%">
            </div>
            <div>
              <div style="font-size:10px;font-family:var(--mono);color:var(--txt4);margin-bottom:3px">Unit Cost $</div>
              <input type="number" data-bedit-cost="${b.id}" value="${parseFloat(b.unitCost)||0}" min="0" step="0.01" style="text-align:right;width:100%">
            </div>
            <div>
              <div style="font-size:10px;font-family:var(--mono);color:var(--txt4);margin-bottom:3px">Notes</div>
              <input type="text" data-bedit-notes="${b.id}" value="${esc(b.notes||'')}" style="font-family:var(--sans);width:100%">
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button data-savebomedit="${b.id}" class="btn-primary" style="font-size:11px;padding:5px 14px">Save</button>
            <button data-cancelbomedit style="font-size:11px;padding:5px 14px;color:var(--txt4)">Cancel</button>
          </div>
        </td>
      </tr>`;
    }

    const lineTotal = (b.qtyPerBuild||1) * (parseFloat(b.unitCost)||0);
    const shared = getSharedProjects(b.part, p.id);
    const invItem = getInventoryItem(b.part);
    const sharedBadge = shared.length
      ? `<span title="Also used in: ${shared.join(', ')}"
           style="font-size:9px;font-family:var(--mono);background:#EDE9FE;color:#5B21B6;
                  border-radius:4px;padding:1px 6px;cursor:default;white-space:nowrap">
           shared · ${shared.length}
         </span>` : '';
    const invBadge = invItem
      ? `<span title="In inventory: ${invItem.qtyOnHand} on hand"
           style="font-size:9px;font-family:var(--mono);background:#DCFCE7;color:#15803D;
                  border-radius:4px;padding:1px 6px;cursor:default;white-space:nowrap">
           inv: ${invItem.qtyOnHand}
         </span>` : '';
    return `<tr>
      <td style="font-weight:500;color:var(--txt1)">
        <div>${esc(b.part)}</div>
        <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">${sharedBadge}${invBadge}</div>
      </td>
      <td style="text-align:center;font-family:var(--mono)">${b.qtyPerBuild||1}</td>
      <td style="text-align:right;font-family:var(--mono)">$${(parseFloat(b.unitCost)||0).toFixed(2)}</td>
      <td style="text-align:right;font-family:var(--mono);font-weight:500;color:var(--blue-dk)">$${lineTotal.toFixed(2)}</td>
      <td style="color:var(--txt4);font-size:11px">${esc(b.notes)||'—'}</td>
      <td style="text-align:center;white-space:nowrap">
        <button data-editbom="${b.id}" style="font-size:11px;color:#6B7280;padding:3px 8px;margin-right:3px">Edit</button>
        <button class="btn-del" data-delbom="${b.id}">×</button>
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--txt4);font-family:var(--mono)">No parts added yet</td></tr>`;

  // Inventory part names for datalist autocomplete
  const invParts = S.inventory.map(i => `<option value="${esc(i.part)}">`).join('');

  return `
  <div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border-color:#86EFAC">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:10px;font-family:var(--mono);color:#15803D;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px">Cost per build</div>
        <div style="font-size:26px;font-weight:600;color:#15803D;font-family:var(--mono)">$${costPerBuild.toFixed(2)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:11px;font-family:var(--mono);color:#15803D">Units:</label>
        <input type="number" id="bom-units" min="1" value="1"
          style="width:70px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:600;border-color:#86EFAC;background:rgba(255,255,255,0.7)">
        <span style="font-size:13px;color:#15803D">= <strong id="bom-run-total">$${costPerBuild.toFixed(2)}</strong></span>
      </div>
    </div>
  </div>
  <div class="bom-wrap" style="margin-bottom:14px">
    <table>
      <thead><tr>
        <th style="text-align:left">Part</th>
        <th style="text-align:center">Qty/Build</th>
        <th style="text-align:right">Unit Cost</th>
        <th style="text-align:right">Line Total</th>
        <th style="text-align:left">Notes</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="card">
    <div class="card-lbl">Add part</div>
    <datalist id="inv-parts-dl">${invParts}</datalist>
    <div style="display:grid;grid-template-columns:2fr 80px 100px 1fr auto;gap:8px;align-items:center">
      <input type="text" id="bom-part"  list="inv-parts-dl" placeholder="Part name…" style="font-family:var(--sans)">
      <input type="number" id="bom-qty" placeholder="Qty/build" min="1" value="1" style="text-align:center">
      <input type="number" id="bom-cost" placeholder="Unit cost $" min="0" step="0.01" style="text-align:right">
      <input type="text" id="bom-notes" placeholder="Notes…" style="font-family:var(--sans)">
      <button data-addbom class="btn-primary" style="font-size:12px;padding:6px 16px;white-space:nowrap">Add</button>
    </div>
  </div>`;
}

// ── Tab: Blockers ──────────────────────────────────────────────────────────
function rBlockers(p) {
  const op = p.blockers.filter(b=>!b.done);
  const dn = p.blockers.filter(b=> b.done);
  return `<div class="card">
    <div class="card-lbl">Add blocker</div>
    <div style="display:flex;gap:8px">
      <input type="text" id="blk-inp" placeholder="Describe the blocker…" style="font-family:var(--sans);font-size:13px">
      <button data-addblocker style="padding:6px 16px">Add</button>
    </div>
  </div>
  ${op.length ? `<div class="card">
    <div class="card-lbl">Open · ${op.length}</div>
    ${op.map(b=>`<div class="blk-row"><input type="checkbox" data-btog="${b.id}" style="margin-top:1px"><span style="flex:1;font-size:13px">${esc(b.text)}</span></div>`).join('')}

// ── Inventory Manager ──────────────────────────────────────────────────────
function rInventory() {
  const hdr  = document.getElementById('proj-hdr');

  const lowStock = S.inventory.filter(i => i.qtyOnHand <= i.reorderAt);

  hdr.innerHTML = `

// ── Main render ────────────────────────────────────────────────────────────
function rMain() {
  const p = P();
  const hdr  = document.getElementById('proj-hdr');
  const body = document.getElementById('proj-body');
  if (!p) {
    hdr.innerHTML  = '';
    body.innerHTML = `<div class="empty">Select a project from the sidebar</div>`;
    return;
  }
  hdr.innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
          <h1 style="font-size:18px;font-weight:600;letter-spacing:-0.01em">${esc(p.name)}</h1>
          ${stag(p.stage)}
        </div>
        <div style="font-size:12px;color:var(--txt4)">${esc(p.desc)||'No description'} &nbsp;·&nbsp; Lead: <span style="color:var(--txt2)">${esc(p.lead)||'Unassigned'}</span></div>
      </div>
      <a href="${esc(p.sp)}" target="_blank"
         style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
                color:var(--txt3);text-decoration:none;background:var(--surface2);
                border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;flex-shrink:0;transition:all .15s"
         onmouseover="this.style.borderColor='#3B82F6';this.style.color='#3B82F6'"
         onmouseout="this.style.borderColor='';this.style.color=''">
        SharePoint files
      </a>
    </div>
    <div id="stage-wrap">
      <div id="stage-track-bg"></div>
      <div id="stage-track-fg"></div>
      <div id="stage-dots"></div>
    </div>
    <div class="tabs">
      ${[
        ['overview','Overview'],
        ['bom','BOM'],
        ['firmware','Firmware'],
        ['settings','⚙ Settings'],
        ['import','Import']
      ].map(([t,l])=>`<button class="tb${S.tab===t?' on':''}" data-tab="${t}" style="background:none;border:none;border-radius:0">${l}</button>`).join('')}
    </div>`;

  body.innerHTML = `<div id="upd-panel"></div><div id="tab-content"></div>`;
  rStages(p);
  rUpdates(p);

  const tc = document.getElementById('tab-content');
  switch (S.tab) {
    case 'overview':  tc.innerHTML = rOverview(p);  break;
    case 'bom':       tc.innerHTML = rBOM(p);        break;
    case 'firmware':  tc.innerHTML = rFirmware(p);   break;
    case 'settings':  tc.innerHTML = rSettings(p);   break;
    case 'import':    tc.innerHTML = rImport();       break;
  }

  // Post-render wiring
  const nta = document.getElementById('notes-ta');
  if (nta) { nta.value=p.notes; nta.addEventListener('blur',e=>{ P().notes=e.target.value; save(); }); }
  const ita = document.getElementById('imp-ta');
  if (ita) { ita.value=S.importTxt; ita.addEventListener('input',e=>{ S.importTxt=e.target.value; }); }
  const sm = document.getElementById('s-member');
  if (sm) sm.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddMember(); });
  const bp = document.getElementById('bom-part');
  if (bp) {
    bp.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddBOM(); });
    // Auto-fill unit cost from inventory when a known part is selected
    bp.addEventListener('change', e => {
      const inv = getInventoryItem(e.target.value);
      if (inv) {
        const costEl = document.getElementById('bom-cost');
        if (costEl && !costEl.value) costEl.value = inv.unitCost;
      }
    });
  }

  // BOM build calculator: update run total when units input changes
  const buEl = document.getElementById('bom-units');
  if (buEl) {
    const costPerBuild = p.bom.reduce((s,b)=>s+(b.qtyPerBuild||1)*(parseFloat(b.unitCost)||0),0);
    buEl.addEventListener('input', e => {
      const units = parseInt(e.target.value)||1;
      const rt = document.getElementById('bom-run-total');
      if (rt) rt.textContent = '$' + (units * costPerBuild).toFixed(2);
    });
  }

  // Overview summary textarea live-save
  const sumta = document.getElementById('proj-summary-ta');
  if (sumta) {
    sumta.addEventListener('blur', e => { P().summary = e.target.value; save(); });
  }

  // ── Slider live-update wiring (input = live display, change = save) ──
  const fwSlider = document.getElementById('fw-slider');
  if (fwSlider) {
    fwSlider.addEventListener('input', e => {
      const val = parseInt(e.target.value);
      const bar = document.getElementById('fw-bar');
      const lbl = document.getElementById('fw-lbl');
      if (bar) bar.style.width = val + '%';
      if (lbl) lbl.textContent = val + '%';
      P().fw = val;
    });
    fwSlider.addEventListener('change', () => { save(); rSB(); });
  }
  const hwSlider = document.getElementById('hw-slider');
  if (hwSlider) {
    hwSlider.addEventListener('input', e => {
      const val = parseInt(e.target.value);
      const bar = document.getElementById('hw-bar');
      const lbl = document.getElementById('hw-lbl');
      if (bar) bar.style.width = val + '%';
      if (lbl) lbl.textContent = val + '%';
      P().hw = val;
    });
    hwSlider.addEventListener('change', () => { save(); rSB(); });
  }

  // Custom textarea live-save
  document.querySelectorAll('[data-customta]').forEach(el => {
    const sec = (P().sections||[]).find(s=>s.id==el.dataset.customta);
    if (sec) el.value = sec.data.body || '';
    el.addEventListener('input', e=>{
      const s2 = (P().sections||[]).find(s=>s.id==e.target.dataset.customta);
      if (s2) { s2.data.body=e.target.value; save(); }
    });
  });
}

function render() {
  rSB();
  if (S.view === 'inventory') rInventory();
  else rMain();
}

// ── Sidebar events ─────────────────────────────────────────────────────────
// Note: move/archive/restore handlers must come BEFORE the [data-pid] handler
// because those buttons are nested inside .pj[data-pid] elements and would
// otherwise trigger a project selection as well.
document.getElementById('sb').addEventListener('click', e => {
  // ▲ Move project up in priority order
  const mu = e.target.closest('[data-moveup]');
  if (mu) { e.stopPropagation(); doMoveProject(parseInt(mu.dataset.moveup), -1); return; }

  // ▼ Move project down in priority order
  const md = e.target.closest('[data-movedown]');
  if (md) { e.stopPropagation(); doMoveProject(parseInt(md.dataset.movedown), 1); return; }

  // Toggle "Show archived" section visibility
  if (e.target.closest('[data-togglearchived]')) {
    e.stopPropagation(); S.showArchived=!S.showArchived; rSB(); return;
  }

  // Restore an archived project back to active
  const rs = e.target.closest('[data-restore]');
  if (rs) { e.stopPropagation(); doRestoreProject(parseInt(rs.dataset.restore)); return; }

  // Go to inventory view
  if (e.target.closest('[data-goInventory]')) { S.view='inventory'; render(); return; }

  // Select a project (switch main panel to it)
  const pj = e.target.closest('[data-pid]');
  if (pj) { S.sel=parseInt(pj.dataset.pid); S.tab='overview'; S.view='projects'; S.preview=null; S.showUF=false; render(); }
});
document.getElementById('np-btn').addEventListener('click', () => {
  document.getElementById('np-btn').style.display='none';
  document.getElementById('np-form').style.display='block';
  document.getElementById('np-inp').focus();
});
document.getElementById('np-x').addEventListener('click', () => {
  document.getElementById('np-btn').style.display='';
  document.getElementById('np-form').style.display='none';
  document.getElementById('np-inp').value='';
});
document.getElementById('np-ok').addEventListener('click', () => {
  const name = document.getElementById('np-inp').value.trim();
  if (!name) return;
  const id = Date.now();
  S.projects.push({ id, name, stage:'Concept', desc:'', lead:'', team:[], fw:0, hw:0,
    sp:'https://sharepoint.com', archived:false, sections:[], updates:[], bom:[], blockers:[], notes:'', summary:'',
    log:[{ date:tdy(), text:'Project created' }] });
  S.sel=id; S.tab='settings'; S.preview=null; S.showUF=false;
  document.getElementById('np-btn').style.display='';
  document.getElementById('np-form').style.display='none';
  document.getElementById('np-inp').value='';
  save(); render();
});

// ── Main click events ──────────────────────────────────────────────────────
document.getElementById('mn').addEventListener('click', e => {
  const tb = e.target.closest('[data-tab]');
  if (tb) { S.tab=tb.dataset.tab; S.preview=null; render(); return; }

  const sg = e.target.closest('[data-stage]');
  if (sg) { P().stage=sg.dataset.stage; save(); render(); return; }

  const fwb = e.target.closest('[data-fwset]');
  if (fwb) { P().fw=parseInt(fwb.dataset.fwset); save(); rMain(); return; }
  const hwb = e.target.closest('[data-hwset]');
  if (hwb) { P().hw=parseInt(hwb.dataset.hwset); save(); rMain(); return; }

  if (e.target.closest('[data-addblocker]')) { doAddBlocker(); return; }
  if (e.target.closest('[data-toggleuf]'))   { S.showUF=!S.showUF; rUpdates(P()); return; }
  if (e.target.closest('[data-postupd]'))    { doPostUpdate(); return; }

  const ru = e.target.closest('[data-resu]');
  if (ru) { doResolveUpdate(ru.dataset.resu); return; }

  // Update: toggle blocker flag
  const tgb = e.target.closest('[data-togblocker]');
  if (tgb) { doToggleBlocker(tgb.dataset.togblocker); return; }

  // Update: delete
  const delu = e.target.closest('[data-delupdid]');
  if (delu) { doDeleteUpdate(delu.dataset.delupdid); return; }

  // Update: enter edit mode
  const editu = e.target.closest('[data-editupdid]');
  if (editu) { S.editingUpdateId = parseInt(editu.dataset.editupdid); rUpdates(P()); return; }

  // Update: save edit
  const saveedit = e.target.closest('[data-saveedit]');
  if (saveedit) { doSaveEditUpdate(saveedit.dataset.saveedit); return; }

  // Update: cancel edit
  if (e.target.closest('[data-canceledit]')) { S.editingUpdateId = null; rUpdates(P()); return; }

  if (e.target.closest('[data-previmport]')) {
    S.importTxt = document.getElementById('imp-ta')?.value || S.importTxt;
    S.preview = parseImport(S.importTxt);
    rMain(); return;
  }
  if (e.target.closest('[data-applyimport]')) { doApplyImport(); return; }

  // Settings
  if (e.target.closest('[data-savesettings]'))  { doSaveSettings(); return; }
  if (e.target.closest('[data-archiveproject]')) { doArchiveProject(); return; }
  if (e.target.closest('[data-addmember]'))    { doAddMember(); return; }
  const rm = e.target.closest('[data-removemember]');
  if (rm) { doRemoveMember(rm.dataset.removemember); return; }
  if (e.target.closest('[data-deleteproject]')) {
    document.getElementById('del-modal-sub').textContent = `"${P().name}" and all its data will be permanently removed.`;
    document.getElementById('del-modal').style.display='flex'; return;
  }
  if (e.target.closest('[data-confirmdelete]')) { doDeleteProject(); return; }
  if (e.target.closest('[data-canceldelete]'))  { document.getElementById('del-modal').style.display='none'; return; }

  // BOM
  if (e.target.closest('[data-addbom]')) { doAddBOM(); return; }
  const db = e.target.closest('[data-delbom]');
  if (db) { doDeleteBOM(db.dataset.delbom); return; }

  // Inventory
  if (e.target.closest('[data-addinv]')) { doAddInventory(); return; }
  const di = e.target.closest('[data-delinv]');
  if (di) { doDeleteInventory(di.dataset.delinv); return; }
  const ei = e.target.closest('[data-editinv]');
  if (ei) { S.editingInvId = parseInt(ei.dataset.editinv); rInventory(); return; }
  const sei = e.target.closest('[data-saveinvedit]');
  if (sei) { doSaveInvEdit(sei.dataset.saveinvedit); return; }
  if (e.target.closest('[data-cancelinvedit]')) { S.editingInvId = null; rInventory(); return; }

  // BOM edit
  const eb = e.target.closest('[data-editbom]');
  if (eb) { S.editingBomId = parseInt(eb.dataset.editbom); rMain(); return; }
  const sbe = e.target.closest('[data-savebomedit]');
  if (sbe) { doSaveBomEdit(sbe.dataset.savebomedit); return; }
  if (e.target.closest('[data-cancelbomedit]')) { S.editingBomId = null; rMain(); return; }

  // Sections
  if (e.target.closest('[data-opensecmodal]')) { openSecModal(); return; }
  if (e.target.closest('[data-closesecmodal]')) { document.getElementById('sec-modal').style.display='none'; return; }
  const ps = e.target.closest('[data-picksection]');
  if (ps) { doAddSection(ps.dataset.picksection); return; }
  const rss = e.target.closest('[data-removesec]');
  if (rss) { doRemoveSection(rss.dataset.removesec); return; }

  // Section items
  const abi = e.target.closest('[data-addbitem]');   if (abi) { doAddBudgetItem(abi.dataset.addbitem); return; }
  const dbi = e.target.closest('[data-delbitem]');   if (dbi) { doDelSecItem(dbi.dataset.delbitem, dbi.dataset.iid); return; }
  const ami = e.target.closest('[data-addmitem]');   if (ami) { doAddMilestone(ami.dataset.addmitem); return; }
  const dmi = e.target.closest('[data-delmitem]');   if (dmi) { doDelSecItem(dmi.dataset.delmitem, dmi.dataset.iid); return; }
  const ati = e.target.closest('[data-addtitem]');   if (ati) { doAddTestItem(ati.dataset.addtitem); return; }
  const dti = e.target.closest('[data-deltitem]');   if (dti) { doDelSecItem(dti.dataset.deltitem, dti.dataset.iid); return; }
  const ali = e.target.closest('[data-addlitem]');   if (ali) { doAddLinkItem(ali.dataset.addlitem); return; }
  const dli = e.target.closest('[data-dellitem]');   if (dli) { doDelSecItem(dli.dataset.dellitem, dli.dataset.iid); return; }
});

// ── Main change events ─────────────────────────────────────────────────────
document.getElementById('mn').addEventListener('change', e => {
  // (BOM checkboxes removed — ordered/received now lives in Inventory Manager)
  if (e.target.dataset.btog) {
    const b = P().blockers.find(x=>x.id==e.target.dataset.btog);
    if (b) { b.done=!b.done; save(); rMain(); }
    return;
  }
  // fw/hw sliders are wired directly in rMain() post-render for live updates

  // Inventory field checkboxes (ordered / received)
  if (e.target.dataset.invfield) {
    const item = S.inventory.find(i => i.id == e.target.dataset.invfield);
    if (item) { item[e.target.dataset.field] = e.target.checked; save(); rSB(); }
    return;
  }
  if (e.target.dataset.milcheck) {
    const sec = (P().sections||[]).find(s=>s.id==e.target.dataset.milcheck);
    if (sec) {
      const item = sec.data.items.find(i=>i.id==e.target.dataset.iid);
      if (item) { item.done=e.target.checked; save(); rMain(); }
    }
    return;
  }
});

// ── Modal click-outside to close ───────────────────────────────────────────
document.getElementById('sec-modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('sec-modal')) document.getElementById('sec-modal').style.display='none';
});
document.getElementById('del-modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('del-modal')) document.getElementById('del-modal').style.display='none';
});

// ── Actions ────────────────────────────────────────────────────────────────
function doAddBlocker() {
  const val = (S.newBlocker||document.getElementById('blk-inp')?.value||'').trim();
  if (!val) return;
  P().blockers.unshift({ id:Date.now(), text:val, done:false });
  P().log.unshift({ date:tdy(), text:`Blocker added: "${val.slice(0,40)}"` });
  S.newBlocker='';
  save(); render();
}

function doPostUpdate() {
  const type   = document.getElementById('ud-type')?.value || S.ud.type;
  const author = (document.getElementById('ud-auth')?.value||S.ud.author||'').trim()||'Team';
  const text   = (document.getElementById('ud-txt')?.value ||S.ud.text ||'').trim();
  if (!text) return;
  P().updates.unshift({ id:Date.now(), author, date:tdy(), type, text, resolved:false });
  P().log.unshift({ date:tdy(), text:`${UPD_T[type]?.l||'Update'} posted by ${author}` });
  S.showUF=false; S.ud={ type:'direction', author:'', text:'' };
  save(); render();
}

function doResolveUpdate(id) {
  const u = P().updates.find(x=>x.id==id);
  if (u) { u.resolved=true; P().log.unshift({ date:tdy(), text:'Update resolved' }); }
  save(); render();
}

function doApplyImport() {
  if (!S.preview) return;
  const p=P(), pr=S.preview, d=tdy();
  if (pr.stage) p.stage=pr.stage;
  if (pr.fw!==undefined) p.fw=pr.fw;
  if (pr.hw!==undefined) p.hw=pr.hw;
  if (pr.notes) p.notes=pr.notes;
  if (pr.blocker) p.blockers.unshift({ id:Date.now(), text:pr.blocker, done:false });
  if (pr.acts?.length) p.log=[...pr.acts.map(t=>({ date:d, text:t })),...p.log];
  S.importTxt=''; S.preview=null; S.tab='overview';
  save(); render();
}

function doSaveSettings() {
  const p=P();
  const name  = document.getElementById('s-name')?.value.trim();
  const desc  = document.getElementById('s-desc')?.value.trim();
  const lead  = document.getElementById('s-lead')?.value.trim();
  const sp    = document.getElementById('s-sp')?.value.trim();
  if (name !== undefined && name !== '') p.name = name;
  if (desc !== undefined) p.desc = desc;
  if (lead !== undefined) p.lead = lead;
  if (sp   !== undefined) p.sp   = sp;
  p.log.unshift({ date:tdy(), text:'Project settings updated' });
  save(); render();
}

function doAddMember() {
  const inp = document.getElementById('s-member');
  const val = inp?.value.trim();
  if (!val) return;
  const p = P();
  if (!p.team.includes(val)) {
    p.team.push(val);
    p.log.unshift({ date:tdy(), text:`${val} added to team` });
    save();
  }
  if (inp) inp.value='';
  rMain();
}

function doRemoveMember(name) {
  const p=P();
  p.team=p.team.filter(m=>m!==name);
  p.log.unshift({ date:tdy(), text:`${name} removed from team` });
  save(); rMain();
}

function doDeleteProject() {
  document.getElementById('del-modal').style.display='none';
  S.projects=S.projects.filter(p=>p.id!==S.sel);
  S.sel=S.projects.length ? S.projects[0].id : null;
  S.tab='overview';
  save(); render();
}

function doAddBOM() {
  const part        = document.getElementById('bom-part')?.value.trim();
  const qtyPerBuild = parseInt(document.getElementById('bom-qty')?.value)||1;
  const unitCost    = parseFloat(document.getElementById('bom-cost')?.value)||0;
  const notes       = document.getElementById('bom-notes')?.value.trim()||'';
  if (!part) return;
  // Link to inventory if part exists there
  const invItem = getInventoryItem(part);
  P().bom.push({ id:Date.now(), part, inventoryId: invItem?.id||null,
    qtyPerBuild, unitCost: invItem ? invItem.unitCost : unitCost, notes });
  P().log.unshift({ date:tdy(), text:`BOM: added ${part}` });
  save(); rMain();
}

function doSaveBomEdit(id) {
  const b = P().bom.find(x => x.id == id);
  if (!b) return;
  b.part        = document.querySelector(`[data-bedit-part="${id}"]`)?.value.trim()  || b.part;
  b.qtyPerBuild = parseInt(document.querySelector(`[data-bedit-qty="${id}"]`)?.value) || 1;
  b.unitCost    = parseFloat(document.querySelector(`[data-bedit-cost="${id}"]`)?.value) || 0;
  b.notes       = document.querySelector(`[data-bedit-notes="${id}"]`)?.value.trim() || '';
  // Re-link to inventory if part name changed
  const inv = getInventoryItem(b.part);
  b.inventoryId = inv ? inv.id : null;
  P().log.unshift({ date:tdy(), text:`BOM: edited ${b.part}` });
  S.editingBomId = null;
  save(); rMain();
}

function doSaveInvEdit(id) {
  const item = S.inventory.find(x => x.id == id);
  if (!item) return;
  item.part        = document.querySelector(`[data-iedit-part="${id}"]`)?.value.trim()     || item.part;
  item.qtyOnHand   = parseInt(document.querySelector(`[data-iedit-onhand="${id}"]`)?.value)  || 0;
  item.qtyOrdered  = parseInt(document.querySelector(`[data-iedit-ordered="${id}"]`)?.value) || 0;
  item.unitCost    = parseFloat(document.querySelector(`[data-iedit-cost="${id}"]`)?.value)  || 0;
  item.supplier    = document.querySelector(`[data-iedit-supplier="${id}"]`)?.value.trim()   || '';
  item.reorderAt   = parseInt(document.querySelector(`[data-iedit-reorder="${id}"]`)?.value) || 5;
  item.supplierUrl = document.querySelector(`[data-iedit-url="${id}"]`)?.value.trim()        || '';
  S.editingInvId = null;
  save(); rInventory(); rSB();
}

function doAddInventory() {
  const part       = document.getElementById('inv-part')?.value.trim();
  const qtyOnHand  = parseInt(document.getElementById('inv-onhand')?.value)||0;
  const qtyOrdered = parseInt(document.getElementById('inv-ordered')?.value)||0;
  const unitCost   = parseFloat(document.getElementById('inv-cost')?.value)||0;
  const supplier   = document.getElementById('inv-supplier')?.value.trim()||'';
  const reorderAt  = parseInt(document.getElementById('inv-reorder')?.value)||5;
  const supplierUrl= document.getElementById('inv-url')?.value.trim()||'';
  if (!part) return;
  S.inventory.push({ id:Date.now(), part, qtyOnHand, qtyOrdered, unitCost,
    supplier, supplierUrl, reorderAt, ordered:false, received:false });
  save(); rInventory(); rSB();
}

function doDeleteInventory(id) {
  S.inventory = S.inventory.filter(i => i.id != id);
  save(); rInventory(); rSB();
}

function doDeleteBOM(id) {
  const p=P();
  const item=p.bom.find(b=>b.id==id);
  if (item) {
    p.bom=p.bom.filter(b=>b.id!=id);
    p.log.unshift({ date:tdy(), text:`BOM: removed ${item.part}` });
    save(); rMain();
  }
}

function openSecModal() {
  document.getElementById('sec-pick-grid').innerHTML = Object.entries(SEC_TYPES).map(([type,def])=>`
    <button class="sec-pick-opt" data-picksection="${type}">
      <span class="sec-pick-icon">${def.icon}</span>
      <span class="sec-pick-lbl">${def.label}</span>
      <span class="sec-pick-desc">${def.desc}</span>
    </button>`).join('');
  document.getElementById('sec-modal').style.display='flex';
}

function doAddSection(type) {
  document.getElementById('sec-modal').style.display='none';
  const p=P(); if (!p.sections) p.sections=[];
  const def=SEC_TYPES[type];
  let data={};
  if (type==='budget'||type==='milestones'||type==='testlog'||type==='links') data={items:[]};
  if (type==='custom') data={body:''};
  p.sections.push({ id:Date.now(), type, title:def?.label||type, data });
  p.log.unshift({ date:tdy(), text:`Section added: ${def?.label||type}` });
  save(); render();
}

function doRemoveSection(id) {
  const p=P();
  p.sections=(p.sections||[]).filter(s=>s.id!=id);
  save(); render();
}

function doDelSecItem(secId, itemId) {
  const sec=(P().sections||[]).find(s=>s.id==secId);
  if (sec?.data?.items) { sec.data.items=sec.data.items.filter(i=>i.id!=itemId); save(); rMain(); }
}

function doAddBudgetItem(secId) {
  const sec=(P().sections||[]).find(s=>s.id==secId); if (!sec) return;
  const name=document.querySelector(`[data-bf-name="${secId}"]`)?.value.trim();
  const qty =parseInt(document.querySelector(`[data-bf-qty="${secId}"]`)?.value)||1;
  const cost=parseFloat(document.querySelector(`[data-bf-cost="${secId}"]`)?.value)||0;
  if (!name) return;
  sec.data.items.push({ id:Date.now(), name, qty, cost });
  save(); rMain();
}

function doAddMilestone(secId) {
  const sec=(P().sections||[]).find(s=>s.id==secId); if (!sec) return;
  const text=document.querySelector(`[data-mf-text="${secId}"]`)?.value.trim();
  const date=document.querySelector(`[data-mf-date="${secId}"]`)?.value.trim()||'';
  if (!text) return;
  sec.data.items.push({ id:Date.now(), text, date, done:false });
  save(); rMain();
}

function doAddTestItem(secId) {
  const sec=(P().sections||[]).find(s=>s.id==secId); if (!sec) return;
  const date  =document.querySelector(`[data-tf-date="${secId}"]`)?.value.trim()||tdy();
  const test  =document.querySelector(`[data-tf-test="${secId}"]`)?.value.trim();
  const result=document.querySelector(`[data-tf-result="${secId}"]`)?.value||'pass';
  const notes =document.querySelector(`[data-tf-notes="${secId}"]`)?.value.trim()||'';
  if (!test) return;
  sec.data.items.push({ id:Date.now(), date, test, result, notes });
  P().log.unshift({ date:tdy(), text:`Test: ${test} — ${result}` });
  save(); rMain();
}

function doAddLinkItem(secId) {
  const sec=(P().sections||[]).find(s=>s.id==secId); if (!sec) return;
  const label=document.querySelector(`[data-lf-label="${secId}"]`)?.value.trim();
  const url  =document.querySelector(`[data-lf-url="${secId}"]`)?.value.trim();
  if (!url) return;
  sec.data.items.push({ id:Date.now(), label:label||url, url });
  save(); rMain();
}

// ── doToggleBlocker(id) ────────────────────────────────────────────────────
// Toggles the isBlocker flag on an update. When true, the sidebar card for
// that project will flash red until the update is resolved or the flag cleared.
function doToggleBlocker(id) {
  const u = P().updates.find(x => x.id == id);
  if (!u) return;
  u.isBlocker = !u.isBlocker;
  P().log.unshift({ date:tdy(), text: u.isBlocker ? 'Update flagged as blocker' : 'Blocker flag removed' });
  save(); render();
}

// ── doDeleteUpdate(id) ────────────────────────────────────────────────────
// Permanently removes an update (open or resolved) from the project.
function doDeleteUpdate(id) {
  const p = P();
  p.updates = p.updates.filter(u => u.id != id);
  p.log.unshift({ date:tdy(), text:'Update deleted' });
  save(); render();
}

// ── doSaveEditUpdate(id) ──────────────────────────────────────────────────
// Saves edits made in the inline update edit form.
function doSaveEditUpdate(id) {
  const u = P().updates.find(x => x.id == id);
  if (!u) return;
  const newType = document.querySelector(`[data-edittype="${id}"]`)?.value;
  const newText = (document.querySelector(`[data-edittxt="${id}"]`)?.value || '').trim();
  if (newType) u.type = newType;
  if (newText) u.text = newText;
  P().log.unshift({ date:tdy(), text:'Update edited' });
  S.editingUpdateId = null;
  save(); render();
}

// ── doMoveProject(id, dir) ─────────────────────────────────────────────────
// Shifts a project one position up (dir=-1) or down (dir=+1) in S.projects.
// Only active (non-archived) projects participate in ordering; archived ones
// stay at whatever position they were when archived.
function doMoveProject(id, dir) {
  const idx = S.projects.findIndex(p => p.id === id);
  if (idx === -1) return; // project not found
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= S.projects.length) return; // already at edge
  // Swap the two elements
  const tmp = S.projects[idx];
  S.projects[idx] = S.projects[newIdx];
  S.projects[newIdx] = tmp;
  save(); rSB();
}

// ── doArchiveProject() ─────────────────────────────────────────────────────
// Marks the currently selected project as archived (hidden from active list).
// The project and all its data are kept — nothing is deleted. The team can
// restore it at any time via the "Show archived" toggle + Restore button.
function doArchiveProject() {
  const p = P();
  if (!p) return;
  if (p.archived) {
    // If already archived, treat the button as "Restore"
    p.archived = false;
    p.log.unshift({ date:tdy(), text:'Project restored from archive' });
  } else {
    p.archived = true;
    p.log.unshift({ date:tdy(), text:'Project archived' });
    // Switch selection to another active project so the main panel isn't blank
    const next = S.projects.find(x => !x.archived && x.id !== p.id);
    S.sel = next ? next.id : (S.projects[0]?.id || null);
  }
  save(); render();
}

// ── doRestoreProject(id) ───────────────────────────────────────────────────
// Takes a project out of the archive and puts it back in the active list.
// Called from the Restore button shown inside the "Archived" sidebar section.
function doRestoreProject(id) {
  const p = S.projects.find(x => x.id === id);
  if (!p) return;
  p.archived = false;
  p.log.unshift({ date:tdy(), text:'Project restored from archive' });
  S.sel = id; // switch to the restored project
  save(); render();
}

// ── Mobile sidebar toggle ──────────────────────────────────────────────────
function openSB()  { document.getElementById('sb').classList.add('open'); document.getElementById('sb-overlay').classList.add('show'); }
function closeSB() { document.getElementById('sb').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('show'); }

document.getElementById('mob-menu-btn').addEventListener('click', openSB);
document.getElementById('sb-overlay').addEventListener('click', closeSB);

// Close sidebar when a project is selected on mobile
document.getElementById('sb').addEventListener('click', e => {
  if (e.target.closest('[data-pid]') && window.innerWidth <= 700) closeSB();
});

// ── Boot ───────────────────────────────────────────────────────────────────
load().then(() => render());
</script>
